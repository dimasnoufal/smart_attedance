name: smart_attedance
description: "Smart Attendance with Face Detection"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Routing
  go_router: ^15.1.0

  # Functional Programming
  dartz: ^0.10.1

  # Model / Code Generation (annotations)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Camera & ML
  camera: ^0.11.1
  google_mlkit_face_detection: ^0.13.0

  # Permissions
  permission_handler: ^11.4.0
  tflite_flutter: ^0.12.1
  image: ^4.8.0
  sqflite: ^2.4.2
  path: ^1.9.1
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/
